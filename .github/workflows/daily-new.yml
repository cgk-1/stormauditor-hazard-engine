name: hazard-v2-daily-newdb
on:
  schedule:
    - cron: "20 9 * * *"       # after all CONUS local days close + HRRR delay
  workflow_dispatch:
    inputs:
      ingest_date: {description: "local YYYYMMDD or a:b range", required: false}
      tasks: {description: "obs tasks", default: "dailies,lsr"}
      run_hrrr: {description: "run the HRRR job (set false for obs-only)", default: "true"}
jobs:
  hrrr:
    if: ${{ github.event.inputs.run_hrrr != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 110
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: sudo apt-get update -q && sudo apt-get install -y -q libeccodes-dev
      - run: pip install numpy pygrib shapely requests
      - env:
          SUPABASE_URL: https://aozjsfjemobuzqrhxcxy.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvempzZmplbW9idXpxcmh4Y3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NzMyODIsImV4cCI6MjEwMDI0OTI4Mn0.gYwwzMcT4VCuTyWHNXlm8viyeGOsv7isfNgegYAmcV8
          INGEST_SECRET: ${{ secrets.INGEST_SECRET_NEW }}
          INGEST_DATE: ${{ github.event.inputs.ingest_date }}
          FLOOR_MPH: "35"
        run: python hz_hrrr_ingest.py
  obs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install numpy requests
      - env:
          SUPABASE_URL: https://aozjsfjemobuzqrhxcxy.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvempzZmplbW9idXpxcmh4Y3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NzMyODIsImV4cCI6MjEwMDI0OTI4Mn0.gYwwzMcT4VCuTyWHNXlm8viyeGOsv7isfNgegYAmcV8
          INGEST_SECRET: ${{ secrets.INGEST_SECRET_NEW }}
          INGEST_DATE: ${{ github.event.inputs.ingest_date }}
          TASKS: ${{ github.event.inputs.tasks || 'dailies,lsr' }}
        run: python hazard_obs_ingest.py
