name: hazard-daily
on:
  schedule:
    - cron: "40 9 * * *"      # after 06Z day closes + URMA delay
  workflow_dispatch:
    inputs:
      ingest_date: {description: "YYYYMMDD or a:b range", required: false}
      tasks: {description: "obs tasks", default: "dailies,lsr"}
jobs:
  wind:
    runs-on: ubuntu-latest
    timeout-minutes: 110
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: sudo apt-get update -q && sudo apt-get install -y -q libeccodes-dev
      - run: pip install numpy pygrib requests
      - name: National wind layers (ANL + HRRR)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          INGEST_DATE: ${{ github.event.inputs.ingest_date }}
        run: python hazard_wind_ingest.py
  obs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install numpy requests
      - name: Observation layers (station dailies + LSR)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          INGEST_DATE: ${{ github.event.inputs.ingest_date }}
          TASKS: ${{ github.event.inputs.tasks || 'dailies,lsr' }}
        run: python hazard_obs_ingest.py
