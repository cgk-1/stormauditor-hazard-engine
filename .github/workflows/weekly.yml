name: hazard-weekly
on:
  schedule:
    - cron: "20 7 * * 1"      # Mondays: stations + NCEI + HURDAT refresh
  workflow_dispatch:
    inputs:
      ncei_years: {description: "e.g. 2022,2023,2024,2025,2026", required: false}
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install numpy requests
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          TASKS: stations,ncei,hurdat
          NCEI_YEARS: ${{ github.event.inputs.ncei_years }}
        run: python hazard_obs_ingest.py
